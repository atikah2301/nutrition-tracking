<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [tapped, setTapped] = React.useState(false);

      return (
        <div className="text-center px-8">
          <h1 className="text-3xl font-bold mb-2">Nutrition Tracker</h1>
          <p className="text-gray-400 mb-8">Smoke test — if you can see this on your iPhone, we're good to go 🚀</p>
          <button
            onClick={() => setTapped(true)}
            className="bg-green-500 hover:bg-green-400 text-white font-semibold px-6 py-3 rounded-xl text-lg active:scale-95 transition-transform"
          >
            {tapped ? "✅ It's working!" : "Tap me"}
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
