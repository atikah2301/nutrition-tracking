<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #666;
      --text-dim: #999;
      --green: #b6f36a;
      --red: #ff6b6b;
      --amber: #ffc94d;
      --blue: #6ab8f3;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 14px;
      --tab-height: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    #root { height: 100%; display: flex; flex-direction: column; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; }
    input, select { font-family: var(--font); }
    ::-webkit-scrollbar { display: none; }

    .app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; width: 100%; }

    .tabs { display: flex; background: var(--surface); border-top: 1px solid var(--border); height: var(--tab-height); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.15s; padding-top: 6px; }
    .tab.active { color: var(--green); }
    .tab-icon { font-size: 20px; line-height: 1; }

    .screen { flex: 1; overflow-y: auto; padding: 20px 16px calc(var(--tab-height) + 24px); }
    .screen-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; margin-top: 24px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }

    .progress-wrap { margin-bottom: 16px; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .progress-label { font-size: 13px; font-weight: 600; }
    .progress-value { font-size: 13px; font-family: var(--mono); color: var(--text-dim); }
    .progress-track { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
    .progress-fill.cal { background: var(--amber); }
    .progress-fill.pro { background: var(--blue); }
    .progress-fill.over { background: var(--red); }

    .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .log-entry-main { display: flex; align-items: center; padding: 12px 14px; gap: 10px; }
    .log-entry-name { flex: 1; font-size: 15px; font-weight: 500; }
    .log-entry-macros { font-size: 12px; font-family: var(--mono); color: var(--text-dim); text-align: right; line-height: 1.6; }
    .log-entry-expand { font-size: 11px; color: var(--text-muted); padding: 0 14px 10px; }
    .log-entry-ingredient { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); padding: 2px 0; }
    .log-entry-delete { color: var(--text-muted); font-size: 18px; padding: 4px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: var(--green); }
    select.input { appearance: none; }
    .input-row { display: flex; gap: 8px; }
    .input-row .field { flex: 1; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border-radius: 10px; font-size: 15px; font-weight: 600; padding: 12px 18px; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--green); color: #0f0f0f; width: 100%; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 8px; }
    .btn-ghost { color: var(--green); font-size: 14px; font-weight: 600; padding: 4px 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { float: right; font-size: 22px; color: var(--text-muted); margin-top: -2px; }

    .lib-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .lib-item-info { flex: 1; }
    .lib-item-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .lib-item-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
    .lib-item-actions { display: flex; gap: 6px; }
    .badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
    .badge-meal { background: rgba(182,243,106,0.15); color: var(--green); }
    .badge-snack { background: rgba(106,184,243,0.15); color: var(--blue); }

    .weight-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .weight-entry:last-child { border-bottom: none; }
    .weight-val { font-size: 20px; font-weight: 700; font-family: var(--mono); }
    .weight-date { font-size: 12px; color: var(--text-dim); }

    .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .date-nav-label { font-size: 15px; font-weight: 600; }
    .date-nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 18px; color: var(--text-dim); }

    .empty { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 14px; line-height: 1.6; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip { padding: 7px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); transition: all 0.15s; }
    .chip.selected { background: var(--green); color: #0f0f0f; border-color: var(--green); }

    .ing-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
    .ing-row-info { flex: 1; }
    .ing-row-name { font-size: 14px; font-weight: 500; }
    .ing-row-serving { font-size: 12px; color: var(--text-dim); }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .tag { display: inline-block; font-size: 11px; background: var(--surface2); border-radius: 6px; padding: 2px 6px; color: var(--text-dim); margin: 2px 2px 2px 0; }

    .status-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .status-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px; text-align: center; }
    .status-dot { width: 10px; height: 10px; border-radius: 99px; margin: 0 auto 8px; }
    .status-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .status-value { font-size: 14px; font-weight: 700; font-family: var(--mono); }
    .status-hint { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #eaeaea;
      --border: #d4d4d4;
      --text: #1a1a1a;
      --text-muted: #888;
      --text-dim: #666;
      --green: #4a9e2f;
      --red: #d93636;
      --amber: #c98a00;
      --blue: #2a7bbf;
    }
    [data-theme="light"] .btn-primary { color: #fff; }
    [data-theme="light"] .chip.selected { color: #fff; }
    [data-theme="light"] .modal-backdrop { background: rgba(0,0,0,0.4); }
    [data-theme="light"] .badge-meal { background: rgba(74,158,47,0.12); }
    [data-theme="light"] .badge-snack { background: rgba(42,123,191,0.12); }

    .theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer; }
    .theme-toggle-label { font-size: 15px; font-weight: 500; }
    .theme-toggle-track { width: 44px; height: 24px; border-radius: 99px; background: var(--surface2); border: 1px solid var(--border); position: relative; transition: background 0.2s; }
    .theme-toggle-track.on { background: var(--green); }
    .theme-toggle-thumb { width: 18px; height: 18px; border-radius: 99px; background: var(--text); position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
    .theme-toggle-track.on .theme-toggle-thumb { transform: translateX(20px); background: #fff; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };
const uid = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);
const fmt = (d) => {
  if (d === today()) return 'Today';
  const y = new Date(); y.setDate(y.getDate() - 1);
  if (d === y.toISOString().slice(0, 10)) return 'Yesterday';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
};
const displayName = (ing) => ing.brand ? `${ing.name} (${ing.brand})` : ing.name;
const matchesSearch = (ing, q) => { if (!q) return true; const l = q.toLowerCase(); return ing.name.toLowerCase().includes(l) || (ing.brand && ing.brand.toLowerCase().includes(l)); };
const numInput = (setter) => ({
  onChange: e => { const v = e.target.value; if (v === '' || /^\d*\.?\d?$/.test(v)) setter(v); },
  onBlur: e => { const v = e.target.value; if (v && !isNaN(v)) setter(parseFloat(v).toFixed(v.includes('.') ? 1 : 0)); },
});

// ─── FIREBASE ────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDiFb6yipCSb5zzT4Ce-IGKn6ds6uq8Zm4",
  authDomain: "nutrition-tracking-2b815.firebaseapp.com",
  projectId: "nutrition-tracking-2b815",
  storageBucket: "nutrition-tracking-2b815.firebasestorage.app",
  messagingSenderId: "1098474392923",
  appId: "1:1098474392923:web:a5fda21d41571eedce1e7e"
};

let db = null;
let auth = null;
const googleProvider = typeof firebase !== 'undefined' ? new firebase.auth.GoogleAuthProvider() : null;

if (typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey) {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db = firebase.firestore();
  db.enablePersistence().catch(() => {});
}

function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(!!auth);
  useEffect(() => {
    if (!auth) { setLoading(false); return; }
    return auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
  }, []);
  return { user, loading };
}

const FIRESTORE_KEYS = {
  ing_v1: 'ingredients',
  meals_v1: 'meals',
  log_v1: 'log',
  weights_v1: 'weights',
  settings_v1: 'settings',
  theme_v1: 'theme',
};

const saveCloud = (key, val, uid) => {
  if (!db || !uid) return;
  const docKey = FIRESTORE_KEYS[key] || key;
  db.collection('users').doc(uid).collection('data').doc(docKey).set({ value: val }).catch(() => {});
};

const loadCloud = async (key, fallback, uid) => {
  if (!db || !uid) return fallback;
  try {
    const docKey = FIRESTORE_KEYS[key] || key;
    const snap = await db.collection('users').doc(uid).collection('data').doc(docKey).get();
    return snap.exists ? snap.data().value : fallback;
  } catch { return fallback; }
};

const hasLocalData = () => {
  return ['ing_v1','meals_v1','log_v1','weights_v1'].some(k => {
    try { const v = localStorage.getItem(k); return v && JSON.parse(v) && (Array.isArray(JSON.parse(v)) ? JSON.parse(v).length > 0 : Object.keys(JSON.parse(v)).length > 0); } catch { return false; }
  });
};

const uploadLocalToCloud = async (uid) => {
  const keys = ['ing_v1','meals_v1','log_v1','weights_v1','settings_v1','theme_v1'];
  for (const k of keys) {
    try {
      const v = localStorage.getItem(k);
      if (v) saveCloud(k, JSON.parse(v), uid);
    } catch {}
  }
};

function ConfirmDelete({ onConfirm, label, className, style }) {
  const [confirming, setConfirming] = useState(false);
  const timer = React.useRef(null);
  const handleClick = () => {
    if (confirming) { clearTimeout(timer.current); onConfirm(); }
    else { setConfirming(true); timer.current = setTimeout(() => setConfirming(false), 3000); }
  };
  useEffect(() => () => clearTimeout(timer.current), []);
  return <button className={className} style={{...style, ...(confirming ? {color:'var(--red)',fontWeight:600} : {})}} onClick={handleClick}>{confirming ? (label||'Delete?') : '✕'}</button>;
}

const DEFAULT_SETTINGS = { calories: 1200, protein: 100, weightMode: 'lose', weightAmount: null, weightTime: null, weightTimeUnit: 'months' };

function App() {
  const { user, loading: authLoading } = useAuth();
  const [tab, setTab] = useState('dash');
  const [ingredients, setIngredients] = useState(() => load('ing_v1', []));
  const [meals, setMeals] = useState(() => load('meals_v1', []));
  const [log, setLog] = useState(() => load('log_v1', {}));
  const [weights, setWeights] = useState(() => load('weights_v1', []));
  const [settings, setSettings] = useState(() => load('settings_v1', DEFAULT_SETTINGS));
  const [theme, setTheme] = useState(() => load('theme_v1', 'dark'));
  const [cloudLoaded, setCloudLoaded] = useState(false);
  const [migrationPrompt, setMigrationPrompt] = useState(false);

  // Load cloud data when user signs in
  useEffect(() => {
    if (!user || cloudLoaded) return;
    (async () => {
      const cloudIngs = await loadCloud('ing_v1', null, user.uid);
      if (cloudIngs === null && hasLocalData()) {
        // First sign-in with local data — prompt migration
        setMigrationPrompt(true);
      } else if (cloudIngs !== null) {
        // Cloud has data — load it
        setIngredients(await loadCloud('ing_v1', [], user.uid));
        setMeals(await loadCloud('meals_v1', [], user.uid));
        setLog(await loadCloud('log_v1', {}, user.uid));
        setWeights(await loadCloud('weights_v1', [], user.uid));
        setSettings(await loadCloud('settings_v1', DEFAULT_SETTINGS, user.uid));
        setTheme(await loadCloud('theme_v1', 'dark', user.uid));
      }
      setCloudLoaded(true);
    })();
  }, [user]);

  // Reset cloud loaded state on sign out
  useEffect(() => {
    if (!user && cloudLoaded) {
      setCloudLoaded(false);
      // Reload from localStorage
      setIngredients(load('ing_v1', []));
      setMeals(load('meals_v1', []));
      setLog(load('log_v1', {}));
      setWeights(load('weights_v1', []));
      setSettings(load('settings_v1', DEFAULT_SETTINGS));
      setTheme(load('theme_v1', 'dark'));
    }
  }, [user]);

  const handleMigration = async (upload) => {
    if (upload) {
      await uploadLocalToCloud(user.uid);
    }
    // Load from cloud (which now has data if uploaded, or is empty)
    setIngredients(await loadCloud('ing_v1', [], user.uid));
    setMeals(await loadCloud('meals_v1', [], user.uid));
    setLog(await loadCloud('log_v1', {}, user.uid));
    setWeights(await loadCloud('weights_v1', [], user.uid));
    setSettings(await loadCloud('settings_v1', DEFAULT_SETTINGS, user.uid));
    setTheme(await loadCloud('theme_v1', 'dark', user.uid));
    setCloudLoaded(true);
    setMigrationPrompt(false);
  };

  // Persist — always save to localStorage, also to cloud if signed in
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); save('theme_v1', theme); if (user && cloudLoaded) saveCloud('theme_v1', theme, user.uid); }, [theme]);
  useEffect(() => { save('ing_v1', ingredients); if (user && cloudLoaded) saveCloud('ing_v1', ingredients, user.uid); }, [ingredients]);
  useEffect(() => { save('meals_v1', meals); if (user && cloudLoaded) saveCloud('meals_v1', meals, user.uid); }, [meals]);
  useEffect(() => { save('log_v1', log); if (user && cloudLoaded) saveCloud('log_v1', log, user.uid); }, [log]);
  useEffect(() => { save('weights_v1', weights); if (user && cloudLoaded) saveCloud('weights_v1', weights, user.uid); }, [weights]);
  useEffect(() => { save('settings_v1', settings); if (user && cloudLoaded) saveCloud('settings_v1', settings, user.uid); }, [settings]);

  const p = { ingredients, setIngredients, meals, setMeals, log, setLog, weights, setWeights, settings, setSettings, theme, setTheme, user };

  if (authLoading) return (
    <div className="app" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',color:'var(--text-muted)'}}>
        <div style={{fontSize:28,marginBottom:8}}>⚡</div>
        <div style={{fontSize:14}}>Loading...</div>
      </div>
    </div>
  );

  return (
    <div className="app">
      {migrationPrompt && (
        <div className="modal-backdrop" onClick={() => {}}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Local data found</div>
            <p style={{fontSize:14,color:'var(--text-dim)',lineHeight:1.6,marginBottom:20}}>
              You have existing data on this device. Would you like to upload it to the cloud?
            </p>
            <button className="btn btn-primary" style={{marginBottom:10}} onClick={() => handleMigration(true)}>Upload to cloud</button>
            <button className="btn btn-secondary" style={{width:'100%'}} onClick={() => handleMigration(false)}>Skip — start fresh</button>
          </div>
        </div>
      )}
      {tab === 'dash' && <DashScreen {...p} />}
      {tab === 'log' && <LogScreen {...p} />}
      {tab === 'library' && <LibraryScreen {...p} />}
      {tab === 'weight' && <WeightScreen {...p} />}
      {tab === 'settings' && <SettingsScreen {...p} />}
      <nav className="tabs">
        {[['dash','📊','Dashboard'],['log','📋','Log'],['library','🍳','Library'],['weight','⚖️','Weight'],['settings','⚙️','Settings']].map(([id,icon,label]) => (
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>
            <span className="tab-icon">{icon}</span>{label}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ─── DASHBOARD ──────────────────────────────────────────────
function DashChart({ label, data, color, targetValue, targetMode, unit, trendLine, theme }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (!data || data.length === 0) return;

    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const gridCol = isLight ? '#d4d4d4' : '#2e2e2e';
    const tickCol = isLight ? '#888' : '#666';
    const tooltipBg = isLight ? '#ffffff' : '#1a1a1a';
    const tooltipBorder = isLight ? '#d4d4d4' : '#2e2e2e';
    const tooltipTitle = isLight ? '#666' : '#999';
    const tooltipBody = isLight ? '#1a1a1a' : '#f0f0f0';
    const targetFill = isLight ? 'rgba(74,158,47,0.08)' : 'rgba(182,243,106,0.08)';
    const targetBorder = isLight ? 'rgba(74,158,47,0.3)' : 'rgba(182,243,106,0.3)';
    const trendBorder = isLight ? 'rgba(74,158,47,0.4)' : 'rgba(182,243,106,0.4)';

    const ctx = canvasRef.current.getContext('2d');
    const labels = data.map(d => {
      const dt = new Date(d.date + 'T12:00:00');
      return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    });
    const values = data.map(d => d.value);

    const datasets = [];

    // Target band
    if (targetValue != null) {
      const maxVal = Math.max(...values, targetValue) * 1.3;
      if (targetMode === 'max') {
        // Calories: good zone is 0 to target
        datasets.push({
          label: 'Target zone',
          data: labels.map(() => targetValue),
          fill: { target: 'origin' },
          backgroundColor: targetFill,
          borderColor: targetBorder,
          borderWidth: 1,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHitRadius: 0,
          tension: 0,
        });
      } else {
        // Protein: good zone is target to top
        datasets.push({
          label: 'Target zone',
          data: labels.map(() => targetValue),
          fill: { target: { value: maxVal } },
          backgroundColor: targetFill,
          borderColor: targetBorder,
          borderWidth: 1,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHitRadius: 0,
          tension: 0,
        });
      }
    }

    // Main data line
    datasets.push({
      label,
      data: values,
      borderColor: color,
      backgroundColor: color,
      pointRadius: 4,
      pointHoverRadius: 6,
      borderWidth: 2,
      tension: 0.3,
      fill: false,
    });

    // Trend line
    if (trendLine && trendLine.length > 0) {
      const trendValues = data.map(d => {
        const match = trendLine.find(t => t.date === d.date);
        return match ? match.value : null;
      });
      datasets.push({
        label: 'Target',
        data: trendValues,
        borderColor: trendBorder,
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        tension: 0,
        fill: false,
        spanGaps: true,
      });
    }

    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: tooltipBg,
            borderColor: tooltipBorder,
            borderWidth: 1,
            titleColor: tooltipTitle,
            bodyColor: tooltipBody,
            bodyFont: { family: "'DM Mono', monospace" },
            callbacks: {
              label: (ctx) => ctx.dataset.label === 'Target zone' ? null : `${Math.round(ctx.parsed.y * 10) / 10} ${unit}`,
            },
            filter: (item) => item.dataset.label !== 'Target zone',
          },
        },
        scales: {
          x: {
            ticks: { color: tickCol, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 7 },
            grid: { color: gridCol },
            border: { color: gridCol },
          },
          y: {
            ticks: { color: tickCol, font: { family: "'DM Mono', monospace", size: 11 } },
            grid: { color: gridCol },
            border: { color: gridCol },
            beginAtZero: targetValue != null,
          },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [data, color, targetValue, targetMode, label, unit, trendLine, theme]);

  if (!data || data.length === 0) {
    return (
      <div className="card">
        <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{label}</div>
        <p className="empty" style={{padding:'20px 0'}}>No data for this period.</p>
      </div>
    );
  }

  return (
    <div className="card">
      <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{label}</div>
      <div style={{height:180}}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

function DashScreen({ log, weights, settings, theme }) {
  const [range, setRange] = useState('1M');

  const filterByRange = (items) => {
    if (range === 'All') return items;
    const now = new Date();
    const cutoff = new Date();
    if (range === '1W') cutoff.setDate(now.getDate() - 7);
    else if (range === '1M') cutoff.setMonth(now.getMonth() - 1);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    return items.filter(d => d.date >= cutoffStr);
  };

  // Weight data
  const weightData = filterByRange(
    [...weights].sort((a, b) => a.date.localeCompare(b.date)).map(w => ({ date: w.date, value: w.kg }))
  );

  // Weight trend line
  const weightTrend = (() => {
    if (!settings.weightAmount || !settings.weightTime || weightData.length === 0) return null;
    const startDate = new Date(weightData[0].date + 'T12:00:00');
    const startKg = weightData[0].value;
    const endDate = new Date(startDate);
    if (settings.weightTimeUnit === 'weeks') endDate.setDate(endDate.getDate() + settings.weightTime * 7);
    else endDate.setMonth(endDate.getMonth() + settings.weightTime);
    const totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
    if (totalDays <= 0) return null;
    const sign = settings.weightMode === 'lose' ? -1 : 1;
    const endKg = startKg + sign * settings.weightAmount;
    return weightData.map(d => {
      const dt = new Date(d.date + 'T12:00:00');
      const elapsed = (dt - startDate) / (1000 * 60 * 60 * 24);
      if (elapsed < 0) return { date: d.date, value: null };
      const progress = Math.min(elapsed / totalDays, 1);
      return { date: d.date, value: Math.round((startKg + (endKg - startKg) * progress) * 10) / 10 };
    });
  })();

  // Calorie & protein daily totals
  const dailyTotals = Object.entries(log)
    .map(([date, entries]) => ({
      date,
      cal: entries.reduce((s, e) => s + e.calories, 0),
      pro: entries.reduce((s, e) => s + e.protein, 0),
    }))
    .sort((a, b) => a.date.localeCompare(b.date));

  const filteredTotals = filterByRange(dailyTotals);
  const calData = filteredTotals.map(d => ({ date: d.date, value: Math.round(d.cal) }));
  const proData = filteredTotals.map(d => ({ date: d.date, value: Math.round(d.pro) }));

  // Status indicators
  const calStatus = (() => {
    if (filteredTotals.length === 0) return null;
    const avg = filteredTotals.reduce((s, d) => s + d.cal, 0) / filteredTotals.length;
    const ratio = avg / settings.calories;
    const color = ratio <= 1 ? 'var(--green)' : ratio <= 1.2 ? 'var(--amber)' : 'var(--red)';
    const hint = ratio <= 1 ? 'On track' : ratio <= 1.2 ? 'Slightly over' : 'Over target';
    return { value: `${Math.round(avg)} kcal`, color, hint };
  })();

  const proStatus = (() => {
    if (filteredTotals.length === 0) return null;
    const avg = filteredTotals.reduce((s, d) => s + d.pro, 0) / filteredTotals.length;
    const ratio = avg / settings.protein;
    const color = ratio >= 1 ? 'var(--green)' : ratio >= 0.7 ? 'var(--amber)' : 'var(--red)';
    const hint = ratio >= 1 ? 'On track' : ratio >= 0.7 ? 'Needs focus' : 'Under target';
    return { value: `${Math.round(avg)}g`, color, hint };
  })();

  const weightStatus = (() => {
    if (weightData.length === 0 || !weightTrend) return null;
    const latest = weightData[weightData.length - 1];
    const trendPt = weightTrend.find(t => t.date === latest.date);
    if (!trendPt || trendPt.value === null) return null;
    const diff = latest.value - trendPt.value;
    const isLose = settings.weightMode === 'lose';
    const directed = isLose ? diff : -diff; // positive = bad direction
    const color = directed <= 0 ? 'var(--green)' : directed <= 1 ? 'var(--amber)' : 'var(--red)';
    const hint = directed <= 0 ? 'On track' : directed <= 1 ? 'Slightly off' : 'Off target';
    return { value: `${latest.value} kg`, color, hint };
  })();

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', overflow:'hidden'}}>
      <div style={{padding:'20px 16px 0', flexShrink:0}}>
        <div className="screen-title">Dashboard</div>
        <div className="chips" style={{marginBottom:14}}>
          {['1W','1M','All'].map(r => (
            <button key={r} className={`chip ${range===r?'selected':''}`} onClick={() => setRange(r)}>{r}</button>
          ))}
        </div>
        {(weightStatus || calStatus || proStatus) && (
          <div className="status-row">
            {weightStatus && (
              <div className="status-card">
                <div className="status-dot" style={{background:weightStatus.color}} />
                <div className="status-label">Weight</div>
                <div className="status-value">{weightStatus.value}</div>
                <div className="status-hint" style={{color:weightStatus.color}}>{weightStatus.hint}</div>
              </div>
            )}
            {calStatus && (
              <div className="status-card">
                <div className="status-dot" style={{background:calStatus.color}} />
                <div className="status-label">Calories</div>
                <div className="status-value">{calStatus.value}</div>
                <div className="status-hint" style={{color:calStatus.color}}>{calStatus.hint}</div>
              </div>
            )}
            {proStatus && (
              <div className="status-card">
                <div className="status-dot" style={{background:proStatus.color}} />
                <div className="status-label">Protein</div>
                <div className="status-value">{proStatus.value}</div>
                <div className="status-hint" style={{color:proStatus.color}}>{proStatus.hint}</div>
              </div>
            )}
          </div>
        )}
      </div>
      <div style={{flex:1, overflowY:'auto', padding:'0 16px', paddingBottom:`calc(var(--tab-height) + 16px)`}}>
        <DashChart label="Weight (kg)" data={weightData} color="#c4a8ff" unit="kg" trendLine={weightTrend} theme={theme} />
        <DashChart label="Calories (kcal)" data={calData} color="#f0a0b0" targetValue={settings.calories} targetMode="max" unit="kcal" theme={theme} />
        <DashChart label="Protein (g)" data={proData} color="#7ecfc0" targetValue={settings.protein} targetMode="min" unit="g" theme={theme} />
      </div>
    </div>
  );
}

// ─── LOG ────────────────────────────────────────────────────
function LogScreen({ log, setLog, ingredients, meals, settings }) {
  const [date, setDate] = useState(today());
  const [modal, setModal] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [cloneModal, setCloneModal] = useState(false);
  const [cloneDate, setCloneDate] = useState('');
  const [cloned, setCloned] = useState(false);
  const [cloneReplace, setCloneReplace] = useState(true);

  const entries = log[date] || [];
  const mealEntries = entries.filter(e => e.category === 'meal');
  const snackEntries = entries.filter(e => e.category === 'snack');
  const totals = entries.reduce((a, e) => ({ cal: a.cal + e.calories, pro: a.pro + e.protein }), { cal: 0, pro: 0 });
  const calPct = Math.min((totals.cal / settings.calories) * 100, 100);
  const proPct = Math.min((totals.pro / settings.protein) * 100, 100);
  const pastDates = Object.keys(log).filter(d => d !== today() && log[d].length > 0).sort((a, b) => b.localeCompare(a));
  const todayHasEntries = (log[today()] || []).length > 0;

  const addEntry = (entry) => { setLog(prev => ({ ...prev, [date]: [...(prev[date] || []), { ...entry, id: uid() }] })); setModal(null); };
  const removeEntry = (id) => setLog(prev => ({ ...prev, [date]: prev[date].filter(e => e.id !== id) }));
  const shiftDate = (d) => { const dt = new Date(date + 'T12:00:00'); dt.setDate(dt.getDate() + d); setDate(dt.toISOString().slice(0, 10)); };
  const cloneEntries = (fromDate, replace) => {
    const src = log[fromDate] || [];
    if (src.length === 0) return;
    const cloned = src.map(e => ({ ...e, id: uid() }));
    setLog(prev => ({ ...prev, [today()]: replace ? cloned : [...(prev[today()] || []), ...cloned] }));
    setCloneModal(false); setCloneDate('');
    setCloned(true); setTimeout(() => setCloned(false), 2000);
  };

  return (
    <div className="screen">
      <div className="date-nav">
        <button className="date-nav-btn" onClick={() => shiftDate(-1)}>‹</button>
        <span className="date-nav-label">{fmt(date)}</span>
        <button className="date-nav-btn" onClick={() => shiftDate(1)} style={{opacity: date===today()?0.3:1}} disabled={date===today()}>›</button>
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div className="progress-wrap">
          <div className="progress-header">
            <span className="progress-label">Calories</span>
            <span className="progress-value" style={{color: totals.cal>settings.calories?'var(--red)':undefined}}>{Math.round(totals.cal)} / {settings.calories} kcal</span>
          </div>
          <div className="progress-track"><div className={`progress-fill cal ${totals.cal>settings.calories?'over':''}`} style={{width:calPct+'%'}} /></div>
        </div>
        <div className="progress-wrap" style={{marginBottom:0}}>
          <div className="progress-header">
            <span className="progress-label">Protein</span>
            <span className="progress-value" style={{color: totals.pro>settings.protein?'var(--red)':undefined}}>{Math.round(totals.pro)} / {settings.protein} g</span>
          </div>
          <div className="progress-track"><div className={`progress-fill pro ${totals.pro>settings.protein?'over':''}`} style={{width:proPct+'%'}} /></div>
        </div>
      </div>

      <div className="section-label" style={{marginTop:0}}>Meals</div>
      {mealEntries.length===0 && <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:10}}>No meals logged yet.</p>}
      {mealEntries.map(e => <EntryCard key={e.id} entry={e} settings={settings} expanded={expandedId===e.id} onToggle={() => setExpandedId(expandedId===e.id?null:e.id)} onDelete={() => removeEntry(e.id)} />)}
      <button className="btn btn-secondary btn-sm" style={{width:'100%',marginBottom:20}} onClick={() => setModal('meal')}>+ Add Meal</button>

      <div className="section-label" style={{marginTop:0}}>Snacks</div>
      {snackEntries.length===0 && <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:10}}>No snacks logged yet.</p>}
      {snackEntries.map(e => <EntryCard key={e.id} entry={e} settings={settings} expanded={expandedId===e.id} onToggle={() => setExpandedId(expandedId===e.id?null:e.id)} onDelete={() => removeEntry(e.id)} />)}
      <button className="btn btn-secondary btn-sm" style={{width:'100%'}} onClick={() => setModal('snack')}>+ Add Snack</button>

      {date === today() && pastDates.length > 0 && (
        <button className="btn btn-secondary btn-sm" style={{width:'100%',marginTop:20}} onClick={() => { setCloneDate(pastDates[0]); setCloneModal(true); }}>
          {cloned ? '✅ Cloned!' : '📋 Clone from previous'}
        </button>
      )}
      {date !== today() && entries.length > 0 && (
        <button className="btn btn-secondary btn-sm" style={{width:'100%',marginTop:20}} onClick={() => { setCloneDate(date); setCloneReplace(true); setCloneModal(true); }}>
          {cloned ? '✅ Cloned!' : '📋 Clone to today'}
        </button>
      )}

      {cloneModal && (
        <div className="modal-backdrop" onClick={() => setCloneModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setCloneModal(false)}>✕</button>
            <div className="modal-title">Clone to today</div>
            {date === today() && <div className="field">
              <label>Select a day to clone</label>
              <select className="input" value={cloneDate} onChange={e => setCloneDate(e.target.value)}>
                {pastDates.map(d => <option key={d} value={d}>{fmt(d)} — {log[d].length} {log[d].length===1?'entry':'entries'}</option>)}
              </select>
            </div>}
            {cloneDate && log[cloneDate] && (
              <div style={{marginBottom:14}}>
                {log[cloneDate].map((e, i) => (
                  <div key={i} style={{fontSize:13,color:'var(--text-dim)',padding:'3px 0'}}>{e.name} — {Math.round(e.calories)} kcal · {Math.round(e.protein)}g pro</div>
                ))}
              </div>
            )}
            {todayHasEntries && (
              <div className="field">
                <label>Today already has entries</label>
                <div className="chips" style={{marginBottom:0}}>
                  <button className={`chip ${cloneReplace?'selected':''}`} onClick={()=>setCloneReplace(true)}>Replace</button>
                  <button className={`chip ${!cloneReplace?'selected':''}`} onClick={()=>setCloneReplace(false)}>Add to existing</button>
                </div>
              </div>
            )}
            <button className="btn btn-primary" onClick={() => cloneEntries(cloneDate, cloneReplace && todayHasEntries)}>Clone to today</button>
          </div>
        </div>
      )}

      {modal && <LogModal category={modal} ingredients={ingredients} meals={meals} settings={settings} onAdd={addEntry} onClose={() => setModal(null)} />}
    </div>
  );
}

function EntryCard({ entry, settings, expanded, onToggle, onDelete }) {
  const targetRatio = settings.calories>0 ? (settings.protein*4)/settings.calories : 0;
  const entryRatio = entry.calories>0 ? (entry.protein*4)/entry.calories : 0;
  const pct = targetRatio>0 ? entryRatio/targetRatio : 1;
  const dotCol = pct>=1?'var(--green)':pct>=0.7?'var(--amber)':'var(--red)';
  return (
    <div className="log-entry">
      <div className="log-entry-main">
        <div style={{flex:1}}>
          <div className="log-entry-name"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dotCol,marginRight:6,verticalAlign:'middle'}} />{entry.name}</div>
          {entry.servingDisplay && <div style={{fontSize:11,color:'var(--text-muted)'}}>{entry.servingDisplay}</div>}
        </div>
        <div className="log-entry-macros">
          <div style={{color:'var(--amber)'}}>{Math.round(entry.calories)} kcal</div>
          <div style={{color:'var(--blue)'}}>{Math.round(entry.protein)}g prot</div>
        </div>
        {entry.isComposite && <button className="log-entry-delete" onClick={onToggle}>{expanded?'▲':'▼'}</button>}
        <ConfirmDelete className="log-entry-delete" onConfirm={onDelete} />
      </div>
      {expanded && entry.ingredients && (
        <div className="log-entry-expand">
          {entry.ingredients.map((ing, i) => (
            <div key={i} className="log-entry-ingredient">
              <span>{ing.name} — {ing.servingDisplay}</span>
              <span>{Math.round(ing.calories)} kcal · {Math.round(ing.protein)}g</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const composites = meals.filter(m => m.category === category && (!search || m.name.toLowerCase().includes(search.toLowerCase())));
  const filteredIngs = ingredients.filter(ing => matchesSearch(ing, search));

  const logComposite = (m) => {
    const ings = m.ingredients.map(ing => {
      const d = ingredients.find(i => i.id === ing.id);

      const f = grams / 100;
      return { name: displayName(d), servingDisplay: `${ing.serving} ${ing.unit}`, calories: d.caloriesPer100 * f, protein: d.proteinPer100 * f };
    }).filter(Boolean);
    const cal = ings.reduce((a,i)=>a+i.calories,0);
    const pro = ings.reduce((a,i)=>a+i.protein,0);
    onAdd({ name: m.name, category, calories: cal, protein: pro, isComposite: true, ingredients: ings });

                <button key={m.id} className="lib-item" style={{width:'100%',textAlign:'left'}} onClick={() => logComposite(m)}>
                  <div className="lib-item-info">
                    <div className="lib-item-name"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:mDot,marginRight:6,verticalAlign:'middle'}} />{m.name}</div>
                    <div className="lib-item-meta">{m.ingredients.length} ingredients</div>
                  </div>
                  <span style={{color:'var(--green)',fontSize:20}}>›</span>
                </button>
              ); })}
              <div className="divider" />
            </>}
            <div className="section-label" style={{marginTop:0}}>Individual Ingredients</div>
            {ingredients.length===0 && !search && <p className="empty" style={{padding:'16px 0'}}>No ingredients yet — add them in the Library tab first.</p>}
            {filteredIngs.length===0 && search && <p style={{fontSize:13,color:'var(--text-muted)',padding:'16px 0',textAlign:'center'}}>No ingredients match "{search}"</p>}
            {filteredIngs.map(ing => { const iRatio = ing.caloriesPer100>0 ? (ing.proteinPer100*4)/ing.caloriesPer100 : 0; const iPct = targetRatio>0 ? iRatio/targetRatio : 1; const iDot = iPct>=1?'var(--green)':iPct>=0.7?'var(--amber)':'var(--red)'; return (
              <button key={ing.id} className="lib-item" style={{width:'100%',textAlign:'left'}} onClick={() => pickIng(ing)}>
                <div className="lib-item-info">
                  <div className="lib-item-name"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:iDot,marginRight:6,verticalAlign:'middle'}} />{displayName(ing)}</div>
                  <div className="lib-item-meta">{ing.caloriesPer100} kcal · {ing.proteinPer100}g pro / 100{ing.defaultUnit==='ml'?'ml':'g'}</div>
                </div>
                <span style={{color:'var(--green)',fontSize:20}}>›</span>
              </button>
            ); })}
          </div>
        </>}

        {mode === 'ingredient' && selected && <>
          <button className="btn-ghost" onClick={() => setMode('pick')}>← Back</button>
          <div style={{marginTop:14}}>

            <div className="input-row">

              </div>
              <div className="field" style={{flex:1}}>
                <label>Unit</label>
                <input className="input" placeholder={selected.defaultUnit||'g'} value={unit} onChange={e => setUnit(e.target.value)} />
              </div>
            </div>
            {preview && (
              <div className="card" style={{marginBottom:14,display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--amber)',fontFamily:'var(--mono)',fontSize:14}}>{preview.cal} kcal</span>
                <span style={{color:'var(--blue)',fontFamily:'var(--mono)',fontSize:14}}>{preview.pro}g protein</span>
              </div>
            )}
            <button className="btn btn-primary" onClick={logIng}>Log This</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── LIBRARY ─────────────────────────────────────────────────
function LibraryScreen({ ingredients, setIngredients, meals, setMeals, settings, log, setLog }) {
  const [view, setView] = useState('ingredients');
  const [modal, setModal] = useState(null);
  const [editing, setEditing] = useState(null);
  const [quickLog, setQuickLog] = useState(null);
  const [qlCategory, setQlCategory] = useState('snack');
  const [qlAmount, setQlAmount] = useState('');
  const [qlUnit, setQlUnit] = useState('g');
  const [qlDone, setQlDone] = useState(false);

  const logToToday = (entry) => {
    setLog(prev => ({ ...prev, [today()]: [...(prev[today()] || []), { ...entry, id: uid() }] }));
    setQlDone(true); setTimeout(() => { setQlDone(false); setQuickLog(null); }, 1200);
  };

  const logCompositeQuick = (m) => {
    const ings = m.ingredients.map(ing => {
      const d = ingredients.find(i => i.id === ing.id);
      if (!d) return null;
      const f = parseFloat(ing.serving) / 100;
      return { name: displayName(d), servingDisplay: `${ing.serving} ${ing.unit}`, calories: d.caloriesPer100 * f, protein: d.proteinPer100 * f };
    }).filter(Boolean);
    const cal = ings.reduce((a, i) => a + i.calories, 0);
    const pro = ings.reduce((a, i) => a + i.protein, 0);
    logToToday({ name: m.name, category: qlCategory, calories: cal, protein: pro, isComposite: true, ingredients: ings });
  };

  const logIngQuick = (ing) => {
    const amt = parseFloat(qlAmount);
    if (!amt || isNaN(amt)) return;
    const f = amt / 100;
    logToToday({ name: displayName(ing), category: qlCategory, calories: ing.caloriesPer100 * f, protein: ing.proteinPer100 * f, isComposite: false, servingDisplay: `${qlAmount} ${qlUnit}` });
  };

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', overflow:'hidden'}}>
      <div style={{padding:'20px 16px 0', flexShrink:0}}>
        <div className="screen-title">Library</div>
        <div className="chips">
          <button className={`chip ${view==='ingredients'?'selected':''}`} onClick={() => setView('ingredients')}>Ingredients</button>
          <button className={`chip ${view==='meals'?'selected':''}`} onClick={() => setView('meals')}>Composites</button>
        </div>
      </div>

      <div style={{flex:1, overflowY:'auto', padding:'0 16px'}}>
        {view === 'ingredients' && <>
          {ingredients.length===0 && <p className="empty">No ingredients yet.<br/>Add foods with their per-100g nutrition values.</p>}
          {ingredients.map(ing => { const targetRatio = settings.calories>0 ? (settings.protein*4)/settings.calories : 0; const ingRatio = ing.caloriesPer100>0 ? (ing.proteinPer100*4)/ing.caloriesPer100 : 0; const pct = targetRatio>0 ? ingRatio/targetRatio : 1; const dotCol = pct>=1?'var(--green)':pct>=0.7?'var(--amber)':'var(--red)'; return (
            <div key={ing.id} className="lib-item">
              <div className="lib-item-info">
                <div className="lib-item-name"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dotCol,marginRight:6,verticalAlign:'middle'}} />{displayName(ing)}</div>
                <div className="lib-item-meta">{ing.caloriesPer100} kcal · {ing.proteinPer100}g pro / 100{ing.defaultUnit==='ml'?'ml':'g'}{ing.defaultServing?` · default: ${ing.defaultServing} ${ing.defaultUnit||'g'}`:''}</div>
              </div>
              <div className="lib-item-actions">
                <button className="btn btn-secondary btn-sm" onClick={() => { setQuickLog({type:'ing',item:ing}); setQlCategory('snack'); setQlAmount(String(ing.defaultServing||100)); setQlUnit(ing.defaultUnit||'g'); }}>Log</button>
                <button className="btn btn-secondary btn-sm" onClick={() => {setEditing(ing);setModal('ing');}}>Edit</button>
                <ConfirmDelete className="btn btn-danger btn-sm" onConfirm={() => setIngredients(p=>p.filter(i=>i.id!==ing.id))} />
              </div>
            </div>
          ); })}
        </>}

        {view === 'meals' && <>
          {meals.length===0 && <p className="empty">No composites yet.<br/>Combine ingredients into saved combos like "Spinach & Egg Breakfast" or "Protein Shake".</p>}
          {meals.map(m => { const t = m.ingredients.reduce((a,ing) => { const d = ingredients.find(x=>x.id===ing.id); if(!d) return a; const f = parseFloat(ing.serving)/100; return { cal: a.cal+d.caloriesPer100*f, pro: a.pro+d.proteinPer100*f }; }, {cal:0,pro:0}); const targetRatio = settings.calories>0 ? (settings.protein*4)/settings.calories : 0; const mealRatio = t.cal>0 ? (t.pro*4)/t.cal : 0; const pct = targetRatio>0 ? mealRatio/targetRatio : 1; const dotCol = pct>=1?'var(--green)':pct>=0.7?'var(--amber)':'var(--red)'; return (
            <div key={m.id} className="lib-item" style={{flexDirection:'column',alignItems:'flex-start',gap:8}}>
              <div style={{display:'flex',width:'100%',alignItems:'center',gap:10}}>
                <div className="lib-item-info">
                  <div className="lib-item-name"><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dotCol,marginRight:6,verticalAlign:'middle'}} />{m.name}<span className={`badge badge-${m.category}`}>{m.category}</span></div>
                  <div className="lib-item-meta">{Math.round(t.cal)} kcal · {Math.round(t.pro)}g pro · {m.ingredients.length} ingredients</div>
                </div>
                <div className="lib-item-actions">
                  <button className="btn btn-secondary btn-sm" onClick={() => { setQuickLog({type:'composite',item:m}); setQlCategory(m.category||'meal'); }}>Log</button>
                  <button className="btn btn-secondary btn-sm" onClick={() => {setEditing(m);setModal('meal');}}>Edit</button>
                  <ConfirmDelete className="btn btn-danger btn-sm" onConfirm={() => setMeals(p=>p.filter(x=>x.id!==m.id))} />
                </div>
              </div>
              <div>{m.ingredients.map((ing,i) => {
                const d = ingredients.find(x=>x.id===ing.id);
                return d ? <span key={i} className="tag">{displayName(d)} · {ing.serving} {ing.unit}</span> : null;
              })}</div>
            </div>
          ); })}
        </>}
      </div>

      <div style={{padding:'12px 16px', paddingBottom:`calc(var(--tab-height) + 16px)`, flexShrink:0, background:'var(--bg)'}}>
        {view === 'ingredients' && <button className="btn btn-primary" onClick={() => {setEditing(null);setModal('ing');}}>+ New Ingredient</button>}
        {view === 'meals' && <button className="btn btn-primary" onClick={() => {setEditing(null);setModal('meal');}}>+ New Composite</button>}
      </div>

      {modal==='ing' && <IngredientModal initial={editing} onSave={ing => { if(editing) setIngredients(p=>p.map(i=>i.id===editing.id?{...ing,id:editing.id}:i)); else setIngredients(p=>[...p,{...ing,id:uid()}]); setModal(null); }} onClose={() => setModal(null)} />}
      {modal==='meal' && <MealModal initial={editing} ingredients={ingredients} settings={settings} onSave={m => { if(editing) setMeals(p=>p.map(x=>x.id===editing.id?{...m,id:editing.id}:x)); else setMeals(p=>[...p,{...m,id:uid()}]); setModal(null); }} onClose={() => setModal(null)} />}

      {quickLog && (
        <div className="modal-backdrop" onClick={() => setQuickLog(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setQuickLog(null)}>✕</button>
            <div className="modal-title">Quick Log to Today</div>
            <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{quickLog.type==='composite' ? quickLog.item.name : displayName(quickLog.item)}</div>

            <div className="field" style={{marginTop:14}}>
              <label>Category</label>
              <div className="chips" style={{marginBottom:0}}>
                <button className={`chip ${qlCategory==='meal'?'selected':''}`} onClick={()=>setQlCategory('meal')}>Meal</button>
                <button className={`chip ${qlCategory==='snack'?'selected':''}`} onClick={()=>setQlCategory('snack')}>Snack</button>
              </div>
            </div>

            {quickLog.type === 'composite' && (() => {
              const m = quickLog.item;
              const t = m.ingredients.reduce((a,ing) => { const d = ingredients.find(x=>x.id===ing.id); if(!d) return a; const f = parseFloat(ing.serving)/100; return { cal: a.cal+d.caloriesPer100*f, pro: a.pro+d.proteinPer100*f }; }, {cal:0,pro:0});
              return <>
                <div style={{marginTop:10,marginBottom:14}}>
                  {m.ingredients.map((ing,i) => { const d = ingredients.find(x=>x.id===ing.id); return d ? <div key={i} style={{fontSize:12,color:'var(--text-dim)',padding:'2px 0'}}>{displayName(d)} · {ing.serving} {ing.unit}</div> : null; })}
                </div>
                <div className="card" style={{marginBottom:14,display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'var(--amber)',fontFamily:'var(--mono)',fontSize:14}}>{Math.round(t.cal)} kcal</span>
                  <span style={{color:'var(--blue)',fontFamily:'var(--mono)',fontSize:14}}>{Math.round(t.pro)}g protein</span>
                </div>
                <button className="btn btn-primary" onClick={() => logCompositeQuick(m)}>{qlDone ? '✅ Logged!' : 'Log to today'}</button>
              </>;
            })()}

            {quickLog.type === 'ing' && (() => {
              const ing = quickLog.item;
              const amt = parseFloat(qlAmount);
              const preview = amt && !isNaN(amt) ? { cal: Math.round(ing.caloriesPer100 * amt / 100), pro: Math.round(ing.proteinPer100 * amt / 100) } : null;
              return <>
                <div className="input-row" style={{marginTop:10}}>
                  <div className="field" style={{flex:2}}>
                    <label>Amount</label>
                    <input className="input" type="text" inputMode="decimal" placeholder="e.g. 40" value={qlAmount} {...numInput(setQlAmount)} />
                  </div>
                  <div className="field" style={{flex:1}}>
                    <label>Unit</label>
                    <select className="input" value={qlUnit} onChange={e=>setQlUnit(e.target.value)}><option value="g">g</option><option value="ml">ml</option></select>
                  </div>
                </div>
                {preview && (
                  <div className="card" style={{marginBottom:14,display:'flex',justifyContent:'space-between'}}>
                    <span style={{color:'var(--amber)',fontFamily:'var(--mono)',fontSize:14}}>{preview.cal} kcal</span>
                    <span style={{color:'var(--blue)',fontFamily:'var(--mono)',fontSize:14}}>{preview.pro}g protein</span>
                  </div>
                )}
                <button className="btn btn-primary" style={{opacity:preview?1:0.4}} onClick={() => logIngQuick(ing)}>{qlDone ? '✅ Logged!' : 'Log to today'}</button>
              </>;
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

function IngredientModal({ initial, onSave, onClose }) {
  const [name, setName] = useState(initial?.name||'');
  const [brand, setBrand] = useState(initial?.brand||'');
  const [cal, setCal] = useState(initial?.caloriesPer100||'');
  const [pro, setPro] = useState(initial?.proteinPer100||'');
  const [defServing, setDefServing] = useState(initial?.defaultServing||'');
  const [defUnit, setDefUnit] = useState(initial?.defaultUnit||'g');
  const valid = name && cal && pro;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-title">{initial?'Edit':'New'} Ingredient</div>
        <div className="field"><label>Name</label><input className="input" placeholder="e.g. Greek Yogurt" value={name} onChange={e=>setName(e.target.value)} /></div>
        <div className="field"><label>Brand (optional)</label><input className="input" placeholder="e.g. Sainsbury's" value={brand} onChange={e=>setBrand(e.target.value)} /></div>
        <div className="input-row">
          <div className="field"><label>Calories / 100g or 100ml</label><input className="input" type="text" inputMode="decimal" placeholder="480" value={cal} {...numInput(setCal)} /></div>
          <div className="field"><label>Protein / 100g or 100ml</label><input className="input" type="text" inputMode="decimal" placeholder="6" value={pro} {...numInput(setPro)} /></div>
        </div>
        <div className="divider" />
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Optional: set a default serving size.</div>
        <div className="input-row">
          <div className="field"><label>Default serving</label><input className="input" type="text" inputMode="decimal" placeholder="100" value={defServing} {...numInput(setDefServing)} /></div>
          <div className="field"><label>Unit</label><select className="input" value={defUnit} onChange={e=>setDefUnit(e.target.value)}><option value="g">g</option><option value="ml">ml</option></select></div>
        </div>
        <button className="btn btn-primary" style={{opacity:valid?1:0.4}} onClick={() => valid && onSave({ name, brand:brand||null, caloriesPer100:parseFloat(cal), proteinPer100:parseFloat(pro), defaultServing:defServing?parseFloat(defServing):null, defaultUnit:defUnit||'g' })}>{initial?'Save Changes':'Add Ingredient'}</button>
      </div>
    </div>
  );
}

function MealModal({ initial, ingredients, settings, onSave, onClose }) {
  const [name, setName] = useState(initial?.name||'');
  const [category, setCategory] = useState(initial?.category||'meal');
  const [mealIngs, setMealIngs] = useState(initial?.ingredients||[]);
  const [adding, setAdding] = useState(false);
  const [pickId, setPickId] = useState('');
  const [pickServing, setPickServing] = useState('');
  const [pickUnit, setPickUnit] = useState('g');
  const [ingSearch, setIngSearch] = useState('');

  const addIng = () => {
    if (!pickId||!pickServing) return;
    setMealIngs(p=>[...p,{id:pickId,serving:parseFloat(pickServing),unit:pickUnit}]);
    setPickId(''); setPickServing(''); setPickUnit('g'); setIngSearch(''); setAdding(false);
  };

  const filteredPickIngs = ingredients.filter(ing => matchesSearch(ing, ingSearch));

  const valid = name && mealIngs.length > 0;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-title">{initial?'Edit':'New'} Composite</div>
        <div className="field"><label>Name</label><input className="input" placeholder="e.g. Spinach & Egg Breakfast" value={name} onChange={e=>setName(e.target.value)} /></div>
        <div className="field">
          <label>Category</label>
          <div className="chips" style={{marginBottom:0}}>
            <button className={`chip ${category==='meal'?'selected':''}`} onClick={()=>setCategory('meal')}>Meal</button>
            <button className={`chip ${category==='snack'?'selected':''}`} onClick={()=>setCategory('snack')}>Snack</button>
          </div>
        </div>
        <div className="section-label">Ingredients</div>
        {mealIngs.map((ing,i)=>{
          const d=ingredients.find(x=>x.id===ing.id);
          return d?(<div key={i} className="ing-row"><div className="ing-row-info"><div className="ing-row-name">{displayName(d)}</div><div className="ing-row-serving">{ing.serving} {ing.unit}</div></div><button style={{color:'var(--red)',fontSize:16}} onClick={()=>setMealIngs(p=>p.filter((_,j)=>j!==i))}>✕</button></div>):null;
        })}
        {adding ? (
          <div className="card">
            {!pickId ? (<>
              <input className="input" placeholder="Search ingredients..." value={ingSearch} onChange={e=>setIngSearch(e.target.value)} style={{marginBottom:10}} />
              <div style={{height:160,overflowY:'auto'}}>
                {filteredPickIngs.length===0 && <p style={{fontSize:13,color:'var(--text-muted)',textAlign:'center',padding:'8px 0'}}>No matches</p>}
                {filteredPickIngs.map(i => { const tR = settings.calories>0 ? (settings.protein*4)/settings.calories : 0; const iR = i.caloriesPer100>0 ? (i.proteinPer100*4)/i.caloriesPer100 : 0; const p = tR>0 ? iR/tR : 1; const dc = p>=1?'var(--green)':p>=0.7?'var(--amber)':'var(--red)'; return (
                  <button key={i.id} className="lib-item" style={{width:'100%',textAlign:'left',padding:'8px 10px',marginBottom:4}} onClick={()=>{
                    setPickId(i.id);
                    setPickServing(String(i.defaultServing||100));
                    setPickUnit(i.defaultUnit||'g');
                  }}>
                    <div className="lib-item-info">
                      <div style={{fontSize:13,fontWeight:500}}><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dc,marginRight:6,verticalAlign:'middle'}} />{displayName(i)}</div>
                    </div>
                    <span style={{color:'var(--green)',fontSize:16}}>›</span>
                  </button>
                ); })}
              </div>
              <button className="btn btn-secondary btn-sm" style={{width:'100%',marginTop:8}} onClick={()=>{setAdding(false);setIngSearch('');}}>Cancel</button>
            </>) : (<>
              <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>{displayName(ingredients.find(i=>i.id===pickId))}</div>
              <div className="input-row">
                <div className="field"><label>Amount</label><input className="input" type="text" inputMode="decimal" placeholder="80" value={pickServing} {...numInput(setPickServing)} /></div>
                <div className="field"><label>Unit</label><select className="input" value={pickUnit} onChange={e=>setPickUnit(e.target.value)}><option value="g">g</option><option value="ml">ml</option></select></div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary" style={{flex:1}} onClick={addIng}>Add</button>
                <button className="btn btn-secondary" style={{flex:1}} onClick={()=>{setPickId('');setIngSearch('');}}>Back</button>
              </div>
            </>)}
          </div>
        ):(
          <button className="btn btn-secondary btn-sm" style={{width:'100%',marginBottom:16}} onClick={()=>setAdding(true)}>+ Add Ingredient</button>
        )}
        <button className="btn btn-primary" style={{opacity:valid?1:0.4,marginTop:8}} onClick={()=>valid&&onSave({name,category,ingredients:mealIngs})}>{initial?'Save Changes':'Create Meal'}</button>
      </div>
    </div>
  );
}

// ─── WEIGHT ──────────────────────────────────────────────────
function WeightScreen({ weights, setWeights }) {
  const latest = weights[0];
  const [kg, setKg] = useState(latest ? String(latest.kg) : '');
  const [date, setDate] = useState(today());
  const [toast, setToast] = useState(null); // { msg, updated }
  const toastTimer = React.useRef(null);

  const logWeight = () => {
    if (!kg || isNaN(kg)) return;
    const rounded = parseFloat(parseFloat(kg).toFixed(1));
    const entry = { id: uid(), date, kg: rounded };
    const isUpdate = weights.some(w => w.date === date);
    setWeights(prev => {
      const without = prev.filter(w => w.date !== date);
      return [entry, ...without].sort((a, b) => b.date.localeCompare(a.date));
    });
    clearTimeout(toastTimer.current);
    setToast({ msg: isUpdate ? `Entry updated for ${fmt(date)}` : `New entry added for ${fmt(date)}`, updated: isUpdate });
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  };

  const prev = weights[1];
  const diff = latest && prev ? (latest.kg - prev.kg).toFixed(1) : null;

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', overflow:'hidden'}}>
      {/* Fixed top section */}
      <div style={{padding:'20px 16px 0', flexShrink:0}}>
        <div className="screen-title">Weight</div>
        {latest && (
          <div className="card" style={{marginBottom:12,textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Latest</div>
            <div style={{fontSize:52,fontWeight:700,fontFamily:'var(--mono)',color:'var(--green)',lineHeight:1}}>{latest.kg}</div>
            <div style={{fontSize:14,color:'var(--text-dim)',marginTop:4}}>kg · {fmt(latest.date)}</div>
            {diff!==null && <div style={{marginTop:8,fontSize:14,color:parseFloat(diff)<0?'var(--green)':parseFloat(diff)>0?'var(--red)':'var(--text-dim)'}}>{parseFloat(diff)>0?'+':''}{diff} kg since last entry</div>}
          </div>
        )}
        <div className="card" style={{marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Log Weight</div>
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <div className="field" style={{flex:2,marginBottom:0,display:'flex',gap:4,alignItems:'center'}}>
              <button className="btn btn-secondary" style={{padding:'10px 10px',fontSize:16,lineHeight:1,flexShrink:0}} onClick={()=>setKg(v=>{const n=parseFloat(v);return isNaN(n)?v:(Math.max(0,n-0.1)).toFixed(1);})}>−</button>
              <input className="input" type="text" inputMode="decimal" placeholder="e.g. 82.4" value={kg} {...numInput(setKg)} style={{textAlign:'center'}} />
              <button className="btn btn-secondary" style={{padding:'10px 10px',fontSize:16,lineHeight:1,flexShrink:0}} onClick={()=>setKg(v=>{const n=parseFloat(v);return isNaN(n)?v:(n+0.1).toFixed(1);})}>+</button>
            </div>
            <div className="field" style={{flex:2,marginBottom:0}}>
              <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
            </div>
            <button className="btn btn-primary" style={{flex:0,whiteSpace:'nowrap',marginBottom:0,padding:'11px 16px'}} onClick={logWeight}>Log</button>
          </div>
          {/* Toast */}
          <div style={{
            marginTop: toast ? 10 : 0,
            maxHeight: toast ? 28 : 0,
            overflow: 'hidden',
            transition: 'max-height 0.25s ease, opacity 0.25s ease',
            opacity: toast ? 1 : 0,
            fontSize: 13,
            color: toast?.updated ? 'var(--amber)' : 'var(--green)',
            fontWeight: 500,
          }}>{toast?.msg}</div>
        </div>
        <div className="section-label" style={{marginTop:16,marginBottom:8}}>History</div>
      </div>

      {/* Scrollable history */}
      <div style={{flex:1, overflowY:'auto', padding:'0 16px', paddingBottom:`calc(var(--tab-height) + 16px)`}}>
        {weights.length===0 && <p className="empty">No entries yet. Log your morning weight above.</p>}
        {weights.length>0 && (
          <div className="card">
            {weights.map((w,i)=>{
              const p=weights[i+1];
              const d=p?(w.kg-p.kg).toFixed(1):null;
              return (
                <div key={w.id} className="weight-entry">
                  <div>
                    <div className="weight-val">{w.kg} <span style={{fontSize:14,color:'var(--text-dim)'}}>kg</span></div>
                    {d!==null&&<div style={{fontSize:11,color:parseFloat(d)<0?'var(--green)':parseFloat(d)>0?'var(--red)':'var(--text-dim)'}}>{parseFloat(d)>0?'+':''}{d} kg</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="weight-date">{fmt(w.date)}</div>
                    <ConfirmDelete style={{fontSize:11,marginTop:4}} label="Remove?" onConfirm={()=>setWeights(p=>p.filter(x=>x.id!==w.id))} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SETTINGS ────────────────────────────────────────────────
function SettingsScreen({ settings, setSettings, theme, setTheme, user }) {
  const [cal, setCal] = useState(String(settings.calories));
  const [pro, setPro] = useState(String(settings.protein));
  const [authMode, setAuthMode] = useState(null); // null | 'email'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [isRegister, setIsRegister] = useState(false);
  const [authError, setAuthError] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  const signInGoogle = async () => {
    if (!auth || !googleProvider) return;
    setAuthError('');
    try { await auth.signInWithRedirect(googleProvider); } catch (e) { setAuthError(e.message); }
  };
  const signInEmail = async () => {
    if (!auth || !email || !password) return;
    setAuthError(''); setAuthLoading(true);
    try {
      if (isRegister) await auth.createUserWithEmailAndPassword(email, password);
      else await auth.signInWithEmailAndPassword(email, password);
      setAuthMode(null); setEmail(''); setPassword('');
    } catch (e) { setAuthError(e.message); }
    setAuthLoading(false);
  };
  const signOut = async () => { if (auth) await auth.signOut(); };
  const [wMode, setWMode] = useState(settings.weightMode || 'lose');
  const [wAmount, setWAmount] = useState(settings.weightAmount ? String(settings.weightAmount) : '');
  const [wTime, setWTime] = useState(settings.weightTime ? String(settings.weightTime) : '');
  const [wTimeUnit, setWTimeUnit] = useState(settings.weightTimeUnit || 'months');
  const [saved, setSaved] = useState(false);

  const kgPerWeek = (wAmount && wTime && !isNaN(wAmount) && !isNaN(wTime) && parseFloat(wTime) > 0)
    ? parseFloat(wAmount) / (wTimeUnit === 'weeks' ? parseFloat(wTime) : parseFloat(wTime) * 4.345) : null;

  const rateGuidance = (() => {
    if (kgPerWeek === null) return null;
    if (kgPerWeek <= 0.5) return { text: 'Safe and sustainable', color: 'var(--green)' };
    if (kgPerWeek <= 1.0) return { text: 'Aggressive but achievable — requires discipline', color: 'var(--amber)' };
    return { text: 'Not recommended — risk of muscle loss and nutrient deficiency', color: 'var(--red)' };
  })();

  const saveSettings = () => {
    if (!cal||!pro) return;
    setSettings({
      calories: parseFloat(cal),
      protein: parseFloat(pro),
      weightMode: wMode,
      weightAmount: wAmount ? parseFloat(wAmount) : null,
      weightTime: wTime ? parseFloat(wTime) : null,
      weightTimeUnit: wTimeUnit,
    });
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  return (
    <div className="screen">
      <div className="screen-title">Settings</div>
      <div className="card" style={{marginBottom:20}}>
        <div className="field"><label>Daily Calorie Target (kcal)</label><input className="input" type="text" inputMode="decimal" value={cal} {...numInput(setCal)} /></div>
        <div className="field" style={{marginBottom:0}}><label>Daily Protein Target (g)</label><input className="input" type="text" inputMode="decimal" value={pro} {...numInput(setPro)} /></div>
      </div>

      <div className="section-label" style={{marginTop:24}}>Weight Target</div>
      <div className="card" style={{marginBottom:20}}>
        <div className="field">
          <label>Goal</label>
          <div className="chips" style={{marginBottom:0}}>
            <button className={`chip ${wMode==='lose'?'selected':''}`} onClick={()=>setWMode('lose')}>Lose</button>
            <button className={`chip ${wMode==='gain'?'selected':''}`} onClick={()=>setWMode('gain')}>Gain</button>
          </div>
        </div>
        <div className="field"><label>Amount (kg)</label><input className="input" type="text" inputMode="decimal" placeholder="e.g. 5" value={wAmount} {...numInput(setWAmount)} /></div>
        <div className="input-row">
          <div className="field" style={{flex:2}}><label>Timeframe</label><input className="input" type="text" inputMode="decimal" placeholder={wTimeUnit==='weeks'?'e.g. 12':'e.g. 6'} value={wTime} {...numInput(setWTime)} /></div>
          <div className="field" style={{flex:1}}><label>Unit</label><select className="input" value={wTimeUnit} onChange={e=>setWTimeUnit(e.target.value)}><option value="months">Months</option><option value="weeks">Weeks</option></select></div>
        </div>
        {kgPerWeek !== null && (
          <div style={{marginTop:4}}>
            <div style={{fontSize:14,fontFamily:'var(--mono)',marginBottom:6}}>
              {wMode === 'lose' ? '−' : '+'}{(Math.round(kgPerWeek * 100) / 100).toFixed(2)} kg/week
            </div>
            <div style={{fontSize:12,fontWeight:500,color:rateGuidance.color}}>{rateGuidance.text}</div>
          </div>
        )}
      </div>

      <button className="btn btn-primary" onClick={saveSettings}>{saved?'✅ Saved!':'Save Targets'}</button>
      <div className="section-label" style={{marginTop:32}}>Appearance</div>
      <div className="theme-toggle" onClick={() => setTheme(t => t==='dark'?'light':'dark')}>
        <span className="theme-toggle-label">{theme==='light'?'☀️ Light Mode':'🌙 Dark Mode'}</span>
        <div className={`theme-toggle-track ${theme==='light'?'on':''}`}><div className="theme-toggle-thumb" /></div>
      </div>

      <div className="section-label" style={{marginTop:32}}>Account</div>
      {!user ? (
        auth ? (
          <div className="card">
            <p style={{fontSize:12,color:'var(--text-dim)',marginBottom:14}}>Sign in to sync your data across devices.</p>
            {googleProvider && (
              <button className="btn btn-secondary" style={{width:'100%',marginBottom:10}} onClick={signInGoogle}>Sign in with Google</button>
            )}
            {authMode !== 'email' ? (
              <button className="btn btn-secondary" style={{width:'100%'}} onClick={() => setAuthMode('email')}>Sign in with email</button>
            ) : (
              <div>
                <div className="field"><label>Email</label><input className="input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} /></div>
                <div className="field"><label>Password</label><input className="input" type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} /></div>
                <div style={{display:'flex',gap:8,marginBottom:10}}>
                  <button className={`chip ${!isRegister?'selected':''}`} onClick={() => setIsRegister(false)}>Sign In</button>
                  <button className={`chip ${isRegister?'selected':''}`} onClick={() => setIsRegister(true)}>Register</button>
                </div>
                <button className="btn btn-primary" style={{marginBottom:8,opacity:email&&password?1:0.4}} onClick={signInEmail} disabled={authLoading}>{authLoading ? 'Loading...' : (isRegister ? 'Create Account' : 'Sign In')}</button>
                <button className="btn-ghost" onClick={() => { setAuthMode(null); setAuthError(''); }}>Cancel</button>
              </div>
            )}
            {authError && <p style={{fontSize:12,color:'var(--red)',marginTop:10}}>{authError}</p>}
          </div>
        ) : (
          <div className="card">
            <p style={{fontSize:12,color:'var(--text-dim)'}}>Running in offline mode. All data is stored locally on this device.</p>
          </div>
        )
      ) : (
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{user.displayName || user.email}</div>
              {user.displayName && <div style={{fontSize:12,color:'var(--text-dim)'}}>{user.email}</div>}
            </div>
            <button className="btn btn-secondary btn-sm" onClick={signOut}>Sign out</button>
          </div>
          <p style={{fontSize:12,color:'var(--text-dim)',marginTop:10}}>Your data syncs automatically across devices.</p>
        </div>
      )}

      <div className="section-label" style={{marginTop:32}}>About</div>
      <div className="card">
        <p style={{fontSize:13,color:'var(--text-dim)',lineHeight:1.8}}>
          <strong style={{color:'var(--text)'}}>Fuel</strong> — personal nutrition tracker.<br/>
          {user ? 'Your data syncs to the cloud and works offline.' : 'All data is stored locally on your device.'}<br/>
          Ingredients use per-100g values for easy food label comparison.<br/>
          Protein at ~1g per lb bodyweight is a solid target for muscle retention in a calorie deficit.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
